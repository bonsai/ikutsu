<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>いくつに見える？</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 背景の装飾 -->
    <div style="position: fixed; top: -50px; left: -50px; font-size: 40px; opacity: 0.3; animation: floatSakura 8s ease-in-out infinite;">🌸</div>
    <div style="position: fixed; top: 20%; right: -30px; font-size: 30px; opacity: 0.2; animation: floatSakura 6s ease-in-out infinite 1s;">🌸</div>
    <div style="position: fixed; bottom: 10%; left: 5%; font-size: 35px; opacity: 0.25; animation: floatSakura 7s ease-in-out infinite 2s;">🌸</div>
    <div style="position: fixed; bottom: -40px; right: 30%; font-size: 45px; opacity: 0.2; animation: floatSakura 9s ease-in-out infinite 3s;">🌸</div>

    <div class="container" id="mainContainer">
        <h1>ねえあたし、いくつに見える？</h1>
        <p class="subtitle">#生成AIなんでも展示会<br>エージェントがあなたの年齢当ててみせるわ<br><strong>※写真は保存されません</strong><br>#VonsaiApps</p>

        <button class="start-btn" id="startBtn" onclick="startCamera()">始める</button>

        <div class="camera-area" id="cameraArea">
            <video id="cameraPreview" autoplay playsinline></video>
            <!-- 切り替えボタン不要 -->
            <div class="capture-btn" onclick="capture()"></div>
        </div>
    </div>

    <canvas id="captureCanvas" style="display:none;"></canvas>

    <!-- ローディング画面 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="sakura-beat">🌸</div>
        <div class="loading-text" id="loadingText">ドキドキ…</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <!-- 結果画面 -->
    <div class="result-overlay" id="resultOverlay">
        <div style="font-size: 60px; margin-bottom: 20px; animation: floatSakura 2s ease-in-out infinite;">🌸</div>
        <div class="result-age" id="resultAge">0</div>
        <div class="result-text">歳に見えます</div>
        <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <button class="retry-btn" onclick="sendFeedback('correct')" style="margin:0; background: #28a745; border-color: #28a745;">だいたいあってる✅</button>
            <button class="retry-btn" onclick="sendFeedback('wrong')" style="margin:0; background: #dc3545; border-color: #dc3545;">ぜんぜんちがう❌</button>
            <button class="retry-btn" onclick="shareTwitter()" style="margin:0; background: #1DA1F2; border-color: #1DA1F2;">Twitterでシェア</button>
        </div>
        <div style="margin-top: 15px;">
            <a href="/stats" style="color: #667eea; text-decoration: none; font-size: 14px;">→ モデル評価統計を見る</a>
        </div>
        <div style="margin-top: 15px; font-size: 12px; color: #888; line-height: 1.6; text-align: center;">
            <p>※推定結果はAIによるもので、実際の年齢と異なる場合があります</p>
            <p>※Sakura AI Engine APIを使用</p>
            <p>※モデル: preview/Qwen3-VL-30B-A3B-Instruct</p>
        </div>
        <div style="margin-top: 15px;">
            <a href="/stats" style="color: #667eea; text-decoration: none; font-size: 14px;">→ モデル評価統計を見る</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
